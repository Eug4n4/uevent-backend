type: object
required:
  - data
properties:
  data:
    type: object
    required:
      - id
      - type
      - attributes
    properties:
      id:
        type: string
        format: uuid
        description: "ID of the promo code to update"
      type:
        type: string
        enum: [promo_code]
      attributes:
        type: object
        properties:
          status:
            type: string
            enum: [active, canceled]
          total:
            type: integer
            minimum: 1
            description: Maximum number of uses
            example: 50
