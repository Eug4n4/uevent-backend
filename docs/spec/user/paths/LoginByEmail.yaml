post:
  tags:
    - login
  summary: Login by email
  description: >
    Endpoint to login a user using their email and password.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/LoginByEmail.yaml'

  responses:
    '200':
      description: Successful login. Access token is set in HttpOnly cookie.
      content:
        application/json:
          schema:
            $ref: '../schemas/Profile.yaml'

    '401':
      description: >
        Unauthorized: Invalid email or password.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'