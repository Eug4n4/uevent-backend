get:
  tags:
    - news
  summary: Get a news item by ID
  description: >
    Returns a single news item by its UUID. No authentication required.
    Pass `?include=companies` to include the full company object.

  parameters:
    - name: id
      in: path
      required: true
      description: "News UUID"
      schema:
        type: string
        format: uuid
    - name: include
      in: query
      description: "Pass `companies` to include the full company object in `included`"
      schema:
        type: string
        enum: [ companies ]

  responses:
    '200':
      description: News item found.
      content:
        application/json:
          schema:
            $ref: '../schemas/News.yaml'
    '404':
      description: News item not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

patch:
  tags:
    - news
  summary: Update a news item
  description: >
    Updates news item fields. All attributes are optional.
    The `data.id` in the body must match the `:id` in the URL.
    Only the company owner can perform this action.
    Requires a valid access token.
  security:
    - cookieAuth: []

  parameters:
    - name: id
      in: path
      required: true
      description: "News UUID"
      schema:
        type: string
        format: uuid

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/NewsUpdate.yaml'

  responses:
    '200':
      description: News item successfully updated.
      content:
        application/json:
          schema:
            $ref: '../schemas/News.yaml'
    '400':
      description: Validation error or body id mismatch.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Forbidden. Not the company owner.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: News item not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

delete:
  tags:
    - news
  summary: Delete a news item
  description: >
    Permanently deletes a news item. Only the company owner can perform this action.
    Requires a valid access token.
  security:
    - cookieAuth: []

  parameters:
    - name: id
      in: path
      required: true
      description: "News UUID"
      schema:
        type: string
        format: uuid

  responses:
    '204':
      description: News item successfully deleted.
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Forbidden. Not the company owner.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: News item not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
