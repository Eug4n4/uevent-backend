type: object
required:
  - data
properties:
  data:
    type: object
    required:
      - type
      - attributes
      - relationships
    properties:
      type:
        type: string
        enum: [ news ]
      attributes:
        type: object
        required:
          - name
          - text
        properties:
          name:
            type: string
            maxLength: 255
            description: "news title"
            example: "Company Announces New Event"
          text:
            type: string
            maxLength: 255
            description: "news body text"
            example: "We are excited to announce our upcoming event..."
      relationships:
        type: object
        required:
          - company
        properties:
          company:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - id
                  - type
                properties:
                  id:
                    type: string
                    format: uuid
                    description: "ID of the company this news belongs to"
                  type:
                    type: string
                    enum: [ company ]
