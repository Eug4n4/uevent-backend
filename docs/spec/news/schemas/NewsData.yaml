type: object
required:
  - id
  - type
  - attributes
  - relationships
properties:
  id:
    type: string
    format: uuid
    description: "news ID"
  type:
    type: string
    enum: [ news ]
  attributes:
    type: object
    required:
      - name
      - text
      - created_at
      - updated_at
    properties:
      name:
        type: string
        maxLength: 255
        description: "news title"
        example: "Company Announces New Event"
      text:
        type: string
        maxLength: 255
        description: "news body text"
        example: "We are excited to announce our upcoming event..."
      created_at:
        type: string
        format: date-time
        description: "creation timestamp"
      updated_at:
        type: string
        format: date-time
        description: "last update timestamp"
  relationships:
    type: object
    required:
      - company
    properties:
      company:
        type: object
        required:
          - data
        properties:
          data:
            type: object
            required:
              - id
              - type
            properties:
              id:
                type: string
                format: uuid
                description: "ID of the company this news belongs to"
              type:
                type: string
                enum: [ company ]
