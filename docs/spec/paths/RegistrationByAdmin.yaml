post:
  tags:
    - registration
  summary: Register a new admin account
  description: >
    Registers a new account by an authenticated admin.

  security:
    - BearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/auth/RegistrationAdmin.yaml'
  responses:
    '201':
      description: Account successfully registered by admin, always return without include parameters
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth/Account.yaml'

    '400':
      description: >
        Bad Request. Request body is invalid or some attributes do not meet requirements.
        Check the `errors` array for details.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'

    '401':
      description: >
        Unauthorized. Invalid session.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'

    '403':
      description: >
        Forbidden. Initiator does not have enough rights.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'

    '409':
      description: >
        Conflict. Email or username is already taken.
        Check the `detail` field in the response for more information.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'

    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'
