post:
  tags:
    - login
  summary: Login by email
  description: >
    Endpoint to login a user using their email and password.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/auth/LoginByEmail.yaml'

  responses:
    '200':
      description: Successful login
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth/AccessToken.yaml'

    '401':
      description: >
        Unauthorized: Invalid email or password.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'

    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'