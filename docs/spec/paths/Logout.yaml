post:
  tags:
    - login
  summary: Logout
  description: >
    Invalidates the current session of the authenticated account.
  security:
    - BearerAuth: [ ]
  responses:
    '204':
      description: Successfully logged out

    '401':
      description: >
        Unauthorized. Invalid session
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'

    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/shared/Errors.yaml'
