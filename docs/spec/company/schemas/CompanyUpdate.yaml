type: object
required:
  - data
properties:
  data:
    type: object
    required:
      - id
      - type
      - attributes
    properties:
      id:
        type: string
        format: uuid
        description: "must match the :id in the URL"
      type:
        type: string
        enum: [ company ]
      attributes:
        type: object
        properties:
          name:
            type: string
            example: "Acme Corp"
          address:
            type: string
            example: "123 Main St, Kyiv"
          location:
            type: object
            description: "Geographic coordinates of the company"
            required:
              - latitude
              - longitude
            properties:
              latitude:
                type: number
                minimum: -90
                maximum: 90
                example: 50.4501
              longitude:
                type: number
                minimum: -180
                maximum: 180
                example: 30.5234
