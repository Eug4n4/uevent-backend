type: object
required:
  - id
  - type
  - attributes
properties:
  id:
    type: string
    format: uuid
    description: "company ID"
  type:
    type: string
    enum: [ company ]
  attributes:
    type: object
    required:
      - name
      - email
      - address
    properties:
      name:
        type: string
        description: "company name"
        example: "Acme Corp"
      email:
        type: string
        format: email
        description: "company contact email"
        example: "contact@acme.com"
      address:
        type: string
        description: "company physical address"
        example: "123 Main St, Kyiv"
      avatar_url:
        type: string
        nullable: true
        description: "public URL of the company avatar image, or null if not set"
        example: "https://s3.example.com/company/avatar.png"
      banner_url:
        type: string
        nullable: true
        description: "public URL of the company banner image, or null if not set"
        example: "https://s3.example.com/company/banner.png"
