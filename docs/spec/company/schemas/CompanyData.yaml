type: object
required:
  - id
  - type
  - attributes
properties:
  id:
    type: string
    format: uuid
    description: "company ID"
  type:
    type: string
    enum: [ company ]
  attributes:
    type: object
    required:
      - name
      - email
      - address
      - avatar
      - banner
    properties:
      name:
        type: string
        description: "company name"
        example: "Acme Corp"
      email:
        type: string
        format: email
        description: "company contact email"
        example: "contact@acme.com"
      address:
        type: string
        description: "company physical address"
        example: "123 Main St, Kyiv"
      avatar:
        type: string
        description: "avatar file key or URL"
        example: "default.png"
      banner:
        type: string
        description: "banner file key or URL"
        example: "default.png"
