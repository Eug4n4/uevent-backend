type: object
required:
  - data
properties:
  data:
    type: object
    required:
      - type
      - attributes
    properties:
      type:
        type: string
        enum: [ company ]
      attributes:
        type: object
        required:
          - name
          - email
          - address
        properties:
          name:
            type: string
            description: "company name"
            example: "Acme Corp"
          email:
            type: string
            format: email
            description: "company contact email"
            example: "contact@acme.com"
          address:
            type: string
            description: "company physical address"
            example: "123 Main St, Kyiv"
          location:
            type: object
            description: "Optional geographic coordinates of the company"
            required:
              - latitude
              - longitude
            properties:
              latitude:
                type: number
                minimum: -90
                maximum: 90
                example: 50.4501
              longitude:
                type: number
                minimum: -180
                maximum: 180
                example: 30.5234
