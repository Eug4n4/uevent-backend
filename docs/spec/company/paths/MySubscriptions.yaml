get:
  tags:
    - companies
  summary: Get my company subscriptions
  description: >
    Returns a paginated list of companies the authenticated user is subscribed to.
    Requires a valid access token.
  security:
    - cookieAuth: []

  parameters:
    - name: page[limit]
      in: query
      description: "Number of companies per page (1–100, default: 20)"
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: page[offset]
      in: query
      description: "Number of companies to skip (default: 0)"
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    '200':
      description: Paginated list of subscribed companies.
      content:
        application/json:
          schema:
            $ref: '../schemas/CompaniesCollection.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
