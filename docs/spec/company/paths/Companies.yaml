get:
  tags:
    - companies
  summary: Get companies list
  description: >
    Returns a paginated list of companies. Supports filtering by name (case-insensitive, partial match).
    No authentication required.

  parameters:
    - name: name
      in: query
      description: "Filter by company name (case-insensitive, partial match)"
      schema:
        type: string
    - name: page[limit]
      in: query
      description: "Number of companies per page (1–100, default: 20)"
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: page[offset]
      in: query
      description: "Number of companies to skip (default: 0)"
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    '200':
      description: Paginated list of companies.
      content:
        application/json:
          schema:
            $ref: '../schemas/CompaniesCollection.yaml'
    '400':
      description: Validation error in query parameters.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

post:
  tags:
    - companies
  summary: Create a company
  description: >
    Creates a new company. The authenticated account becomes the owner.
    Requires a valid access token.

  security:
    - cookieAuth: []

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/CompanyCreate.yaml'

  responses:
    '201':
      description: Company successfully created.
      content:
        application/json:
          schema:
            $ref: '../schemas/Company.yaml'
    '400':
      description: Validation error or company with this email already exists.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
