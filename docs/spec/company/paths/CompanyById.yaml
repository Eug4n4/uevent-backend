get:
  tags:
    - companies
  summary: Get a company by ID
  description: >
    Returns a single company by its UUID. Returns 404 if the company does not exist or has been deleted.

  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    '200':
      description: Company found.
      content:
        application/json:
          schema:
            $ref: '../schemas/Company.yaml'
    '404':
      description: Company not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

patch:
  tags:
    - companies
  summary: Update a company
  description: >
    Updates company fields. All attributes are optional.
    The `data.id` in the body must match the `:id` in the URL.
    Only the company owner can perform this action.

  security:
    - cookieAuth: []

  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/CompanyUpdate.yaml'

  responses:
    '200':
      description: Company successfully updated.
      content:
        application/json:
          schema:
            $ref: '../schemas/Company.yaml'
    '400':
      description: Validation error or body id mismatch.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Forbidden. You are not the company owner.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Company not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

delete:
  tags:
    - companies
  summary: Delete a company
  description: >
    Soft-deletes a company (sets `deleted_at`). Only the company owner can perform this action.

  security:
    - cookieAuth: []

  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    '204':
      description: Company successfully deleted.
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Forbidden. You are not the company owner.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Company not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
