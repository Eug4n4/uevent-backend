get:
  tags:
    - companies
  summary: Get my companies
  description: >
    Returns all companies where the authenticated account is the owner.
    Requires a valid access token.

  responses:
    '200':
      description: List of owned companies.
      content:
        application/json:
          schema:
            $ref: '../schemas/CompaniesCollection.yaml'

    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
