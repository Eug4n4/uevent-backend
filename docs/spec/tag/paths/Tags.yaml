get:
  tags:
    - tags
  summary: Get tags list
  description: >
    Returns a paginated list of tags. Supports filtering by name (case-insensitive contains).
    No authentication required.

  parameters:
    - name: name
      in: query
      description: "Filter by name (case-insensitive, partial match)"
      schema:
        type: string
    - name: page[limit]
      in: query
      description: "Number of tags per page (1–100, default: 20)"
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: page[offset]
      in: query
      description: "Number of tags to skip (default: 0)"
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    '200':
      description: Paginated list of tags.
      content:
        application/json:
          schema:
            $ref: '../schemas/TagsCollection.yaml'
    '400':
      description: Validation error in query parameters.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

post:
  tags:
    - tags
  summary: Create a tag
  description: >
    Creates a new global tag. Tag name must be unique and contain only letters.
    Requires a valid access token.

  security:
    - cookieAuth: []

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/TagCreate.yaml'

  responses:
    '201':
      description: Tag successfully created.
      content:
        application/json:
          schema:
            $ref: '../schemas/Tag.yaml'
    '400':
      description: Validation error or tag with this name already exists.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
