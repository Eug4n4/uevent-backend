type: object
required:
  - id
  - type
  - attributes
properties:
  id:
    type: string
    format: uuid
    description: "account id"
  type:
    type: string
    enum: [ profile ]
  attributes:
    type: object
    required:
      - username
      - pseudonym
      - updated_at
      - created_at
    properties:
      username:
        type: string
        description: "username for this account and profile"
      pseudonym:
        type: string
        description: "profile pseudonym"
      avatar_url:
        type: string
        description: "avatar key"
      updated_at:
        type: string
        format: date-time
        description: "updated at"
      created_at:
        type: string
        format: date-time
        description: "created at"