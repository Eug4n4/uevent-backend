type: object
required:
  - username
  - pseudonym
  - updated_at
  - created_at
properties:
  username:
    type: string
    description: "username for this account and profile"
  pseudonym:
    type: string
    description: "profile pseudonym"
  avatar_url:
    type: string
    description: "avatar key"
  updated_at:
    type: string
    format: date-time
    description: "updated at"
  created_at:
    type: string
    format: date-time
    description: "created at"