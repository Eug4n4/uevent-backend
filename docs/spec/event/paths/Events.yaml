get:
  tags:
    - events
  summary: Get events list
  description: >
    Returns a paginated list of events. Supports filtering by various parameters
    and sorting by date fields. No authentication required (optional authentication
    to access subscribed_by_user filtering).

  parameters:
    - name: page[limit]
      in: query
      description: "Number of events per page (1–100, default: 20)"
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: page[offset]
      in: query
      description: "Number of events to skip (default: 0)"
      schema:
        type: integer
        minimum: 0
        default: 0
    - name: sort
      in: query
      description: "Sort field. Prefix with `-` for descending order."
      schema:
        type: string
        enum:
          - start_at
          - "-start_at"
          - end_at
          - "-end_at"
          - publish_at
          - "-publish_at"
    - name: format
      in: query
      description: "Filter by one or more event formats (comma-separated)"
      schema:
        type: string
        example: "Lection,Workshop"
    - name: tag
      in: query
      description: "Filter by one or more tag names"
      schema:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
      style: form
      explode: true
    - name: tag_id
      in: query
      description: "Filter by one or more tag UUIDs"
      schema:
        oneOf:
          - type: string
            format: uuid
          - type: array
            items:
              type: string
              format: uuid
      style: form
      explode: true
    - name: company_id
      in: query
      description: "Filter events by company UUID"
      schema:
        type: string
        format: uuid
    - name: published
      in: query
      description: "Filter by published status (comma-separated booleans, e.g. true,false)"
      schema:
        type: string
    - name: subscribed_by_user
      in: query
      description: "Filter events subscribed by the given account UUID"
      schema:
        type: string
        format: uuid
    - name: status
      in: query
      description: >
        Filter by event status. Accepts a comma-separated list: `active`, `canceled`, or `active,canceled`.
        Defaults to `active` when omitted — canceled events are hidden from public listings by default.
      schema:
        type: string
        example: "active"
        default: "active"
    - name: text
      in: query
      description: "Filter by text content (partial match on title and body text)"
      schema:
        type: string
    - name: start_after
      in: query
      description: "Filter events starting after this datetime (ISO 8601)"
      schema:
        type: string
        format: date-time
    - name: start_before
      in: query
      description: "Filter events starting before this datetime (ISO 8601)"
      schema:
        type: string
        format: date-time
    - name: end_after
      in: query
      description: "Filter events ending after this datetime (ISO 8601)"
      schema:
        type: string
        format: date-time
    - name: end_before
      in: query
      description: "Filter events ending before this datetime (ISO 8601)"
      schema:
        type: string
        format: date-time
    - name: near_lat
      in: query
      description: "Latitude of the center point for proximity search. Must be used together with near_lng and near_radius_m."
      schema:
        type: number
        minimum: -90
        maximum: 90
        example: 50.4501
    - name: near_lng
      in: query
      description: "Longitude of the center point for proximity search. Must be used together with near_lat and near_radius_m."
      schema:
        type: number
        minimum: -180
        maximum: 180
        example: 30.5234
    - name: near_radius_m
      in: query
      description: "Search radius in meters. Must be used together with near_lat and near_lng. Only events with a location set are returned."
      schema:
        type: integer
        minimum: 1
        example: 5000
    - name: include
      in: query
      description: "Comma-separated list of related resources to include. Supported: `tags`, `companies`"
      schema:
        type: string
        example: "tags,companies"

  responses:
    '200':
      description: Paginated list of events.
      content:
        application/json:
          schema:
            $ref: '../schemas/EventsCollection.yaml'
    '400':
      description: Validation error in query parameters.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

post:
  tags:
    - events
  summary: Create an event
  description: >
    Creates a new event for a company. Only the company owner can create events.
    Company ID is passed in `data.relationships.company.data.id`.
    Optional tags can be passed in `data.relationships.tags.data`.
    Requires a valid access token.
  security:
    - cookieAuth: []

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/EventCreate.yaml'

  responses:
    '201':
      description: Event successfully created.
      content:
        application/json:
          schema:
            $ref: '../schemas/Event.yaml'
    '400':
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized. Access token is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Forbidden. The authenticated account is not the company owner.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Company not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
