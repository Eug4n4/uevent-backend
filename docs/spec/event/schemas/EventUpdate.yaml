type: object
required:
  - data
properties:
  data:
    type: object
    required:
      - id
      - type
      - attributes
    properties:
      id:
        type: string
        format: uuid
        description: "must match the :id in the URL"
      type:
        type: string
        enum: [ event ]
      attributes:
        type: object
        description: "All fields are optional"
        properties:
          format:
            type: string
            enum: [ Lection, Workshop, Concert, Meeting ]
            description: "event format/category"
          title:
            type: string
            description: "event title"
            example: "Updated Workshop Title"
          text:
            type: string
            maxLength: 10000
            description: "detailed event information"
          publish_at:
            type: string
            format: date-time
            description: "If set to a past timestamp, defaults to the current server time (event is published immediately)"
          start_at:
            type: string
            format: date-time
          end_at:
            type: string
            format: date-time
          notification_new_tickets:
            type: boolean
            description: "Whether to send notifications to subscribers when new tickets become available"
          visitors_visibility:
            type: string
            enum: [ everyone, staff_only, staff_and_visitors ]
            description: "Who can see the event visitor list"
          location:
            type: object
            description: "Geographic coordinates of the event"
            required:
              - latitude
              - longitude
            properties:
              latitude:
                type: number
                minimum: -90
                maximum: 90
                example: 50.4501
              longitude:
                type: number
                minimum: -180
                maximum: 180
                example: 30.5234
