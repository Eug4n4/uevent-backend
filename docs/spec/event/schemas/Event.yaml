type: object
required:
  - data
properties:
  data:
    $ref: './EventData.yaml'
  included:
    type: array
    description: >
      Present when `?include=tags` and/or `?include=companies` is used.
      Contains full tag and/or company objects.
    items:
      oneOf:
        - $ref: '../../tag/schemas/TagData.yaml'
        - $ref: '../../company/schemas/CompanyData.yaml'
