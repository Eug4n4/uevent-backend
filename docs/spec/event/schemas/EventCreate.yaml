type: object
required:
  - data
properties:
  data:
    type: object
    required:
      - type
      - attributes
      - relationships
    properties:
      type:
        type: string
        enum: [ event ]
      attributes:
        type: object
        required:
          - format
          - title
          - text
          - publish_at
          - start_at
          - end_at
        properties:
          format:
            type: string
            description: "event format/category"
            enum: [ Lection, Workshop, Concert, Meeting ]
          title:
            type: string
            description: "event title"
            example: "NestJS Workshop"
          text:
            type: string
            maxLength: 10000
            description: "detailed event information (HTML allowed)"
            example: "<p>Join us for an in-depth NestJS workshop covering controllers, services, and more!</p>"
          publish_at:
            type: string
            format: date-time
            description: "when the event becomes publicly visible"
          start_at:
            type: string
            format: date-time
            description: "when the event starts"
          end_at:
            type: string
            format: date-time
            description: "when the event ends"
          notification_new_tickets:
            type: boolean
            description: "Whether to send notifications to subscribers when new tickets become available"
            default: false
          visitors_visibility:
            type: string
            enum: [ everyone, staff_only, staff_and_visitors ]
            default: everyone
            description: "Who can see the event visitor list"
          location:
            type: object
            description: "Optional geographic coordinates of the event"
            required:
              - latitude
              - longitude
            properties:
              latitude:
                type: number
                minimum: -90
                maximum: 90
                example: 50.4501
              longitude:
                type: number
                minimum: -180
                maximum: 180
                example: 30.5234
      relationships:
        type: object
        required:
          - company
        properties:
          company:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - id
                  - type
                properties:
                  id:
                    type: string
                    format: uuid
                    description: "ID of the company hosting the event"
                  type:
                    type: string
                    enum: [ company ]
          tags:
            type: object
            description: "Optional list of tags to attach to the event"
            properties:
              data:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - type
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [ tag ]
