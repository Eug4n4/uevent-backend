type: object
required:
  - id
  - type
  - attributes
  - relationships
properties:
  id:
    type: string
    format: uuid
    description: "event ID"
  type:
    type: string
    enum: [ event ]
  attributes:
    type: object
    required:
      - status
      - title
      - text
      - format
      - publish_at
      - start_at
      - end_at
    properties:
      status:
        type: string
        enum: [ active, canceled ]
        description: "event status"
      title:
        type: string
        description: "event title"
        example: "NestJS Workshop"
      text:
        type: string
        maxLength: 10000
        description: "detailed event information (HTML allowed)"
        example: "<p>Join us for an in-depth NestJS workshop!</p>"
      format:
        type: string
        description: "event format/category"
        enum: [ Lection, Workshop, Concert, Meeting ]
      publish_at:
        type: string
        format: date-time
        description: "when the event becomes publicly visible"
      start_at:
        type: string
        format: date-time
        description: "when the event starts"
      end_at:
        type: string
        format: date-time
        description: "when the event ends"
      avatar_url:
        type: string
        nullable: true
        description: "public URL of the event avatar image, or null if not set"
        example: "https://s3.example.com/events/avatar.png"
      banner_url:
        type: string
        nullable: true
        description: "public URL of the event banner image, or null if not set"
        example: "https://s3.example.com/events/banner.png"
  relationships:
    type: object
    required:
      - company
    properties:
      company:
        type: object
        required:
          - data
        properties:
          data:
            type: object
            required:
              - id
              - type
            properties:
              id:
                type: string
                format: uuid
                description: "ID of the company hosting the event"
              type:
                type: string
                enum: [ company ]
      tags:
        type: object
        description: "Present only when the event has tags"
        properties:
          data:
            type: array
            items:
              type: object
              required:
                - id
                - type
              properties:
                id:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [ tag ]
