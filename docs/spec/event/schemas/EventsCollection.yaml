type: object
required:
  - data
  - links
properties:
  data:
    type: array
    items:
      $ref: './EventData.yaml'
  included:
    type: array
    description: >
      Present when `?include=tags` and/or `?include=companies` is used.
      Contains deduplicated full tag and/or company objects.
    items:
      oneOf:
        - $ref: '../../tag/schemas/TagData.yaml'
        - $ref: '../../company/schemas/CompanyData.yaml'
  links:
    $ref: '../../shared/PaginationData.yaml'
