openapi: 3.1.0
info:
  title: uevent API
  description: API documentation for uevent backend
  version: 0.1.0
servers:
  - url: http://localhost:6767
security: []
paths:
  /uevent/v1/accounts/registration:
    post:
      tags:
        - auth
      summary: Register a new account
      description: |
        Registers a new user account with email, username, and password. Returns 201 with no body on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Registration'
      responses:
        '201':
          description: Account successfully registered.
        '400':
          description: Validation error (e.g. password too short, invalid email).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: |
            Conflict: An account with this email or username already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/accounts/login:
    post:
      tags:
        - auth
      summary: Login with email and password
      description: |
        Authenticates a user using their email and password. On success, sets `access` and `refresh` cookies and returns the account object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginByEmail'
      responses:
        '200':
          description: |
            Successful login. `access` cookie (JWT access token) and `refresh` httpOnly cookie (JWT refresh token) are set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/accounts/login/google:
    post:
      tags:
        - auth
      summary: Start Google OAuth login
      description: |
        Redirects the user-agent to the Google OAuth consent screen. This endpoint returns a 307 redirect and does not return a JSON body.
      responses:
        '307':
          description: Temporary redirect to Google OAuth consent screen.
          headers:
            Location:
              description: Google OAuth authorization URL.
              schema:
                type: string
                format: uri
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/accounts/login/google/callback:
    get:
      tags:
        - auth
      summary: Google OAuth callback
      description: |
        Exchanges the Google OAuth `code` for user info, creates or logs in the account, sets `access` and `refresh` cookies, and returns the account object.
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: OAuth authorization code returned by Google.
      responses:
        '200':
          description: |
            Successful Google login. `access` and `refresh` cookies are set. Returns the account object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Missing or invalid `code` query parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/accounts/logout:
    post:
      tags:
        - auth
      summary: Logout
      description: |
        Clears the `access` and `refresh` cookies, effectively logging out the authenticated user. Requires a valid access token.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Successfully logged out. Auth cookies are cleared.
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/accounts/refresh:
    post:
      tags:
        - auth
      summary: Refresh access token
      description: |
        Issues a new access/refresh token pair using the `refresh` httpOnly cookie. Both `access` and `refresh` cookies are replaced on success. Requires a valid refresh token cookie.
      security:
        - refreshCookieAuth: []
      responses:
        '200':
          description: Tokens refreshed. New `access` and `refresh` cookies are set.
        '401':
          description: Unauthorized. Refresh token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/accounts:
    delete:
      tags:
        - auth
      summary: Delete my account
      description: |
        Soft-deletes the authenticated account and clears `access` and `refresh` cookies. Requires a valid access token.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Account successfully deleted. Auth cookies are cleared.
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/profiles:
    get:
      tags:
        - profiles
      summary: Filter profiles
      description: |
        Returns a paginated list of public profiles. Supports text-based filtering against username (partial match). No authentication required.
      parameters:
        - in: query
          name: text
          required: false
          schema:
            type: string
          description: Filter by text (partial match on username)
        - in: query
          name: page[limit]
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 'Max number of items to return (1–100, default: 20)'
        - in: query
          name: page[offset]
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 'Number of items to skip (default: 0)'
      responses:
        '200':
          description: Paginated list of profiles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilesCollection'
        '400':
          description: Validation error in query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/profiles/me:
    get:
      tags:
        - profiles
      summary: Get my profile
      description: |
        Returns the current authenticated user's profile. Requires a valid access token.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Profile found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    patch:
      tags:
        - profiles
      summary: Update my profile
      description: |
        Updates the current authenticated user's profile. The `data.id` in the request body must match the authenticated account id. Requires a valid access token.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfile'
      responses:
        '200':
          description: Profile successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          description: Validation error or invalid payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: Username already taken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/profiles/me/avatar:
    post:
      tags:
        - profiles
      summary: Upload my avatar
      description: |
        Uploads or replaces the current authenticated user's avatar image. Requires a valid access token.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Avatar image file
      responses:
        '200':
          description: Avatar uploaded. Returns the updated profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          description: Bad request (invalid file format or size).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    delete:
      tags:
        - profiles
      summary: Delete my avatar
      description: |
        Deletes the current authenticated user's avatar image. Requires a valid access token.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Avatar deleted.
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/profiles/{account_id}:
    get:
      tags:
        - profiles
      summary: Get profile by account id
      description: |
        Returns a public profile by `account_id` (UUID). If the profile does not exist, responds with 404.
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account id (UUID).
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Profile found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          description: Bad request (invalid account_id).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Profile for account does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/profiles/@{username}:
    get:
      tags:
        - profiles
      summary: Get profile by username
      description: |
        Returns a public profile by `username`. If the profile does not exist, responds with 404.
      parameters:
        - name: username
          in: path
          required: true
          description: Username of the profile owner.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Profile found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          description: Profile for user does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/companies:
    get:
      tags:
        - companies
      summary: Get companies list
      description: |
        Returns a paginated list of companies. Supports filtering by name (case-insensitive, partial match). Pass `me=true` (requires authentication via `access` cookie) to return only companies where the current user is a member.
      security:
        - {}
        - cookieAuth: []
      parameters:
        - name: name
          in: query
          description: Filter by company name (case-insensitive, partial match)
          schema:
            type: string
        - name: me
          in: query
          description: |
            When true, return only companies where the authenticated user is a member. Requires a valid access token.
          schema:
            type: boolean
            default: false
        - name: page[limit]
          in: query
          description: 'Number of companies per page (1–100, default: 20)'
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page[offset]
          in: query
          description: 'Number of companies to skip (default: 0)'
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of companies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompaniesCollection'
        '400':
          description: Validation error in query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    post:
      tags:
        - companies
      summary: Create a company
      description: |
        Creates a new company. The authenticated account becomes the owner. Requires a valid access token.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreate'
      responses:
        '201':
          description: Company successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: Company with this email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/companies/subscriptions:
    get:
      tags:
        - companies
      summary: Get my company subscriptions
      description: |
        Returns a paginated list of companies the authenticated user is subscribed to. Requires a valid access token.
      security:
        - cookieAuth: []
      parameters:
        - name: page[limit]
          in: query
          description: 'Number of companies per page (1–100, default: 20)'
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page[offset]
          in: query
          description: 'Number of companies to skip (default: 0)'
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of subscribed companies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompaniesCollection'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/companies/{id}:
    get:
      tags:
        - companies
      summary: Get a company by ID
      description: |
        Returns a single company by its UUID. Returns 404 if the company does not exist or has been deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Company found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    patch:
      tags:
        - companies
      summary: Update a company
      description: |
        Updates company fields. All attributes are optional. The `data.id` in the body must match the `:id` in the URL. Only the company owner can perform this action.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUpdate'
      responses:
        '200':
          description: Company successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          description: Validation error or body id mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. You are not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    delete:
      tags:
        - companies
      summary: Delete a company
      description: |
        Soft-deletes a company (sets `deleted_at`). Only the company owner can perform this action.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Company successfully deleted.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. You are not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/companies/{id}/avatar:
    post:
      tags:
        - companies
      summary: Upload company avatar
      description: |
        Uploads or replaces a company's avatar image. Only the company owner can perform this action. Requires a valid access token.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Company UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Avatar image file
      responses:
        '200':
          description: Avatar uploaded. Returns the updated company.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          description: Bad request (invalid file).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. Not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/companies/{id}/banner:
    post:
      tags:
        - companies
      summary: Upload company banner
      description: |
        Uploads or replaces a company's banner image. Only the company owner can perform this action. Requires a valid access token.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Company UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - banner
              properties:
                banner:
                  type: string
                  format: binary
                  description: Banner image file
      responses:
        '200':
          description: Banner uploaded. Returns the updated company.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          description: Bad request (invalid file).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. Not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/companies/{id}/subscriptions:
    post:
      tags:
        - companies
      summary: Subscribe to a company
      description: |
        Subscribes the authenticated user to a company. Returns 400 if already subscribed.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Company UUID
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Successfully subscribed.
        '400':
          description: Already subscribed or validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    delete:
      tags:
        - companies
      summary: Unsubscribe from a company
      description: |
        Removes the authenticated user's subscription from a company.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Company UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Successfully unsubscribed.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Company not found or not subscribed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    get:
      tags:
        - companies
      summary: Get company subscribers
      description: |
        Returns a paginated list of profiles subscribed to a company. No authentication required.
      parameters:
        - name: id
          in: path
          required: true
          description: Company UUID
          schema:
            type: string
            format: uuid
        - name: page[limit]
          in: query
          description: 'Number of subscribers per page (1–100, default: 20)'
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page[offset]
          in: query
          description: 'Number of subscribers to skip (default: 0)'
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of subscriber profiles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySubscribersCollection'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
