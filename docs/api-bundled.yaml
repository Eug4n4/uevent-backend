      summary: Update user ticket status (redeem)
      description: |
        Allows a company member to mark a ticket as `used` or `unused`. Only members of the company that owns the event can change the status. This is the ticket redemption endpoint (e.g., scanning a ticket at the door). Cannot change the status of an already canceled ticket.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - type
                    - attributes
                  properties:
                    type:
                      type: string
                      enum:
                        - user_ticket
                    attributes:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                          enum:
                            - used
                            - unused
      responses:
        '200':
          description: Status updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTicket'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Not a company member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: User ticket not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: User ticket is already canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    delete:
      tags:
        - payments
      summary: Cancel a user ticket
      description: |
        Cancels a user ticket (sets `status = canceled`). Only members of the company that owns the event can cancel a ticket. Returns the updated user ticket with status `canceled`. Cannot cancel an already canceled ticket.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User ticket canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTicket'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Not a company member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: User ticket not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: User ticket is already canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/events/{eventId}/cancel:
    post:
      tags:
        - payments
      summary: Cancel an event and refund all tickets
      description: |
        Cancels the event (sets `status = canceled`) and triggers Stripe refunds for all active user tickets with paid transactions.
        Refund flow per ticket:
        - Transaction `paid` + has `payment_intent_id` → Stripe refund initiated, transaction set to `refund_pending`
        - Transaction `pending` (payment never completed) → user_ticket set to `returned` immediately
        The `transaction.status` transitions to `returned` and `user_ticket.status` to `returned` when Stripe fires the `refund.updated` webhook.
        Only the company owner can cancel an event.
      security:
        - cookieAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event canceled and refunds initiated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Event is already canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. Not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/transactions:
    get:
      tags:
        - payments
      summary: List transactions
      description: |
        Returns a paginated list of transactions filtered by one or more criteria. At least one filter is required.
        Access rules:
        - `account_id` only → must equal the authenticated user's own ID
        - `company_id`, `event_id`, `ticket_id`, or `promo_code_id` → requester must be a member
          of the company that owns the relevant event. `account_id` can be combined with these filters.

        Results are ordered by most recent first.
      security:
        - cookieAuth: []
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by account. If used alone, must equal the authenticated user's ID.
        - name: company_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by company (requires company membership).
        - name: event_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by event (requires company membership).
        - name: ticket_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by ticket (requires company membership).
        - name: promo_code_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by promo code (requires company membership).
        - name: page[limit]
          in: query
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: page[offset]
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of transactions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsCollection'
        '400':
          description: No filter provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. Tried to view another user's transactions without a privileged filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Referenced event, ticket, or promo code not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/transactions/{id}:
    get:
      tags:
        - payments
      summary: Get a transaction by ID
      description: |
        Returns a single transaction. Access is granted to the owner of the associated user ticket OR any member of the company that owns the event the ticket belongs to.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. Not the ticket owner or a company member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Transaction not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refresh
  schemas:
    Errors:
      description: Standard JSON:API error
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          description: Non empty array of errors occurred during request processing
          items:
            type: object
            required:
              - status
            properties:
              status:
                type: integer
                description: HTTP status code applicable to this problem
                example: 400
                enum:
                  - 400
                  - 401
                  - 403
                  - 404
                  - 409
                  - 500
              detail:
                description: Human-readable explanation specific to this occurrence of the problem. May be a string or an object (e.g. validation error details).
                example: Request body was expected
    PaginationLinks:
      $ref: '#/components/schemas/PaginationData'
    LoginByEmail:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - account
            attributes:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: The account's email address.
                  example: example@gmail.com
                password:
                  type: string
                  format: password
                  description: The account's password.
                  example: StrongP@ssw0rd!
    Registration:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - account
            attributes:
              type: object
              required:
                - email
                - username
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: The account's email address.
                  example: example@gmail.com
                username:
                  type: string
                  description: The account's username.
                  example: user123
                password:
                  type: string
                  format: password
                  description: The account's password.
                  example: StrongP@ssw0rd!
    Account:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
            - relationships
          properties:
            id:
              type: string
              format: uuid
              description: account ID
            type:
              type: string
              enum:
                - account
            attributes:
              type: object
              required:
                - role
                - email
                - created_at
                - updated_at
              properties:
                role:
                  type: string
                  description: The role assigned to the account
                  example: user
                email:
                  type: string
                  format: email
                  description: The email address associated with the account
                created_at:
                  type: string
                  format: date-time
                  description: The date and time when the account was created
                updated_at:
                  type: string
                  format: date-time
                  description: The date and time when the account was last updated
            relationships:
              type: object
              required:
                - profile
              properties:
                profile:
                  type: object
                  required:
                    - data
                  properties:
                    data:
                      type: object
                      required:
                        - id
                        - type
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: Profile id (same as account id)
                        type:
                          type: string
                          enum:
                            - profile
