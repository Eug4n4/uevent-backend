  /uevent/v1/tickets/{ticketId}/purchase:
    post:
      tags:
        - payments
      summary: Purchase a ticket
      description: |
        Initiates a ticket purchase. Creates a transaction (pending) with pessimistic locking to prevent overselling. Returns a Stripe `client_secret` for the frontend to complete payment with Stripe.js. A 5% platform commission is collected automatically via Stripe Connect application fees. If a promo code is provided, the discount is applied to the price. Free tickets (price = 0 or 100% discount) are fulfilled immediately — no Stripe step required. The company must have completed Stripe Connect onboarding (`stripe_onboarded = true`). After the payment succeeds, the Stripe webhook creates the `user_ticket` automatically.
      security:
        - cookieAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - type
                    - attributes
                  properties:
                    type:
                      type: string
                      enum:
                        - purchase
                    attributes:
                      type: object
                      properties:
                        promo_code:
                          type: string
                          description: Optional promo code to apply a discount
                          example: SUMMER20
                        quantity:
                          type: integer
                          minimum: 1
                          default: 1
                          description: Number of tickets to purchase (defaults to 1)
      responses:
        '201':
          description: Purchase initiated. Use `client_secret` with Stripe.js to complete payment. Null for free tickets.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - purchase
                      attributes:
                        type: object
                        properties:
                          client_secret:
                            type: string
                            description: Stripe PaymentIntent client secret. Null for free tickets.
                            nullable: true
                            example: pi_xxx_secret_yyy
                          transaction_id:
                            type: string
                            format: uuid
                          final_price:
                            type: integer
                            description: Amount in smallest currency unit (e.g. cents)
                            example: 3999
                          currency:
                            type: string
                            example: eur
        '400':
          description: Company billing not set up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Ticket, event, or promo code not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: Ticket canceled, promo code canceled/exhausted, or not enough tickets available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/stripe/webhook:
    post:
      tags:
        - payments
      summary: Stripe webhook endpoint
      description: |
        Receives and processes Stripe webhook events. The request body must be the raw payload and the `Stripe-Signature` header must be present for signature verification.
        Handled events:
        - `payment_intent.succeeded` — marks the transaction as `paid`, creates `user_ticket` records,
          and increments the ticket `sold` count and promo code `used` count.

        **Do not call this endpoint manually.** Register the URL in the Stripe dashboard and configure `STRIPE_WEBHOOK_SECRET` in your environment.
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC signature provided by Stripe for webhook verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe event payload
      responses:
        '200':
          description: Webhook received and processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '400':
          description: Missing or invalid Stripe signature.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
