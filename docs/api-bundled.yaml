        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized. Access token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. The authenticated account is not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
