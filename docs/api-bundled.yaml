              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - id
                    - type
                  properties:
                    id:
                      type: string
                      format: uuid
                      description: ID of the company this news belongs to
                    type:
                      type: string
                      enum:
                        - company
    NewsCollection:
      type: object
      required:
        - data
        - links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NewsData'
        included:
          type: array
          description: Present when ?include=companies is used. Contains deduplicated full company objects.
          items:
            $ref: '#/components/schemas/CompanyData'
        links:
          $ref: '#/components/schemas/PaginationData'
    NewsCreate:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
            - relationships
          properties:
            type:
              type: string
              enum:
                - news
            attributes:
              type: object
              required:
                - name
                - text
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: news title
                  example: Company Announces New Event
                text:
                  type: string
                  maxLength: 255
                  description: news body text
                  example: We are excited to announce our upcoming event...
            relationships:
              type: object
              required:
                - company
              properties:
                company:
                  type: object
                  required:
                    - data
                  properties:
                    data:
                      type: object
                      required:
                        - id
                        - type
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID of the company this news belongs to
                        type:
                          type: string
                          enum:
                            - company
    NewsUpdate:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              format: uuid
              description: must match the :id in the URL
            type:
              type: string
              enum:
                - news
            attributes:
              type: object
              description: All fields are optional
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: news title
                  example: Updated Title
                text:
                  type: string
                  maxLength: 255
                  description: news body text
                  example: Updated content...
    PaginationData:
      type: object
      required:
        - self
      properties:
        self:
          type: string
          format: uri
          description: link to the current page
        first:
          type: string
          format: uri
          description: link to the first page
        last:
          type: string
          format: uri
          description: link to the last page
        prev:
          type: string
          format: uri
          description: link to the previous page
        next:
          type: string
          format: uri
          description: link to the next page
