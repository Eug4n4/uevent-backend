  /uevent/v1/events:
    get:
      tags:
        - events
      summary: Get events list
      description: |
        Returns a paginated list of events. Supports filtering by various parameters and sorting by date fields. No authentication required (optional authentication to access subscribed_by_user filtering).
      parameters:
        - name: page[limit]
          in: query
          description: 'Number of events per page (1–100, default: 20)'
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page[offset]
          in: query
          description: 'Number of events to skip (default: 0)'
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: sort
          in: query
          description: Sort field. Prefix with `-` for descending order.
          schema:
            type: string
            enum:
              - start_at
              - '-start_at'
              - end_at
              - '-end_at'
              - publish_at
              - '-publish_at'
        - name: format
          in: query
          description: Filter by one or more event formats (comma-separated)
          schema:
            type: string
            example: Lection,Workshop
        - name: tag
          in: query
          description: Filter by one or more tag names
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          style: form
          explode: true
        - name: tag_id
          in: query
          description: Filter by one or more tag UUIDs
          schema:
            oneOf:
              - type: string
                format: uuid
              - type: array
                items:
                  type: string
                  format: uuid
          style: form
          explode: true
        - name: company_id
          in: query
          description: Filter events by company UUID
          schema:
            type: string
            format: uuid
        - name: published
          in: query
          description: Filter by published status (comma-separated booleans, e.g. true,false)
          schema:
            type: string
        - name: subscribed_by_user
          in: query
          description: Filter events subscribed by the given account UUID
          schema:
            type: string
            format: uuid
        - name: text
          in: query
          description: Filter by text content (partial match on title/description)
          schema:
            type: string
        - name: start_after
          in: query
          description: Filter events starting after this datetime (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: start_before
          in: query
          description: Filter events starting before this datetime (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: end_after
          in: query
          description: Filter events ending after this datetime (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: end_before
          in: query
          description: Filter events ending before this datetime (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: include
          in: query
          description: 'Comma-separated list of related resources to include. Supported: `tags`, `companies`'
          schema:
            type: string
            example: tags,companies
      responses:
        '200':
          description: Paginated list of events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsCollection'
        '400':
          description: Validation error in query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    post:
      tags:
        - events
      summary: Create an event
      description: |
        Creates a new event for a company. Only the company owner can create events. Company ID is passed in `data.relationships.company.data.id`. Optional tags can be passed in `data.relationships.tags.data`. Requires a valid access token.
      security:
