          in: query
          description: Filter by text content (partial match)
          schema:
            type: string
        - name: page[limit]
          in: query
          description: 'Number of news items per page (1–100, default: 20)'
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page[offset]
          in: query
          description: 'Number of news items to skip (default: 0)'
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: include
          in: query
          description: Pass `companies` to include full company objects in the top-level `included` array
          schema:
            type: string
            enum:
              - companies
      responses:
        '200':
          description: Paginated list of news items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsCollection'
        '400':
          description: Validation error in query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    post:
      tags:
        - news
      summary: Create a news item
      description: |
        Creates a new news item associated with a company. Company ID is passed in `data.relationships.company.data.id`. Requires a valid access token. Only the company owner can create news.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsCreate'
      responses:
        '201':
          description: News item successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/News'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. Not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /uevent/v1/news/{id}:
    get:
      tags:
        - news
      summary: Get a news item by ID
      description: |
        Returns a single news item by its UUID. No authentication required. Pass `?include=companies` to include the full company object.
      parameters:
        - name: id
          in: path
          required: true
          description: News UUID
          schema:
            type: string
            format: uuid
        - name: include
          in: query
          description: Pass `companies` to include the full company object in `included`
          schema:
            type: string
            enum:
              - companies
      responses:
        '200':
          description: News item found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/News'
        '404':
          description: News item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    patch:
      tags:
        - news
      summary: Update a news item
      description: |
        Updates news item fields. All attributes are optional. The `data.id` in the body must match the `:id` in the URL. Only the company owner can perform this action. Requires a valid access token.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: News UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsUpdate'
      responses:
        '200':
          description: News item successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/News'
        '400':
          description: Validation error or body id mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. Not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: News item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    delete:
      tags:
        - news
      summary: Delete a news item
      description: |
        Permanently deletes a news item. Only the company owner can perform this action. Requires a valid access token.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: News UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: News item successfully deleted.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden. Not the company owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: News item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refresh
  schemas:
    Errors:
      description: Standard JSON:API error
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          description: Non empty array of errors occurred during request processing
          items:
            type: object
            required:
              - title
              - status
            properties:
              title:
                type: string
                description: Title is a short, human-readable summary of the problem
                example: Bad Request
              detail:
                type: string
                description: Detail is a human-readable explanation specific to this occurrence of the problem
                example: Request body was expected
              status:
                type: integer
                description: Status is the HTTP status code applicable to this problem
                example: 400
                enum:
                  - 400
                  - 401
                  - 403
                  - 404
                  - 409
                  - 500
    PaginationLinks:
      $ref: '#/components/schemas/PaginationData'
    LoginByEmail:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - account
            attributes:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: The account's email address.
                  example: example@gmail.com
                password:
                  type: string
                  format: password
                  description: The account's password.
                  example: StrongP@ssw0rd!
    Registration:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - account
            attributes:
              type: object
              required:
                - email
                - username
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: The account's email address.
                  example: example@gmail.com
                username:
                  type: string
                  description: The account's username.
                  example: user123
                password:
                  type: string
                  format: password
                  description: The account's password.
                  example: StrongP@ssw0rd!
    Account:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
            - relationships
          properties:
            id:
              type: string
              format: uuid
              description: account ID
            type:
              type: string
              enum:
                - account
            attributes:
              type: object
              required:
                - role
                - email
                - created_at
                - updated_at
              properties:
                role:
                  type: string
                  description: The role assigned to the account
                  example: user
                email:
                  type: string
                  format: email
                  description: The email address associated with the account
                created_at:
                  type: string
                  format: date-time
                  description: The date and time when the account was created
                updated_at:
                  type: string
                  format: date-time
                  description: The date and time when the account was last updated
            relationships:
              type: object
              required:
                - profile
              properties:
                profile:
                  type: object
                  required:
                    - data
                  properties:
                    data:
                      type: object
                      required:
                        - id
                        - type
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: Profile id (same as account id)
                        type:
                          type: string
                          enum:
                            - profile
    UpdateProfile:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
          properties:
            id:
              type: string
              format: uuid
              description: must match the authenticated account id
            type:
              type: string
              enum:
                - profile
            attributes:
              type: object
              description: All fields are optional
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                  description: New username (letters, numbers, -._! only)
