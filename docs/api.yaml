openapi: 3.1.1
info:
  title: uevent auth-svc API
  description: API documentation for uevent
  version: 0.1.0

servers:
  - url: http://localhost:6767

paths:
  /uevent/v1/account/registration/:
    $ref: './spec/paths/Registration.yaml'
  /uevent/v1/account/registration/admin:
    $ref: './spec/paths/RegistrationByAdmin.yaml'

  /uevent/v1/account/login/email:
    $ref: './spec/paths/LoginByEmail.yaml'
  /uevent/v1/account/login/username:
    $ref: './spec/paths/LoginByUsername.yaml'
  /uevent/v1/account/login/google:
    $ref: './spec/paths/LoginByGoogle.yaml'
  /uevent/v1/account/login/google/callback:
    $ref: './spec/paths/LoginByGoogleCallback.yaml'

  /uevent/v1/account/me:
    $ref: './spec/paths/MyAccount.yaml'
  /uevent/v1/account/me/logout:
    $ref: './spec/paths/Logout.yaml'

  /uevent/v1/profile/:
    $ref: './spec/paths/FilterProfiles.yaml'
  /uevent/v1/profile/me:
    $ref: './spec/paths/MyProfile.yaml'
  /uevent/v1/profile/me/avatar:
    $ref: './spec/paths/MyProfileAvatar.yaml'
  /uevent/v1/profile/{profile_id}:
    $ref: './spec/paths/ProfileById.yaml'
  /uevent/v1/profile/@{username}:
    $ref: './spec/paths/ProfileByUsername.yaml'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    #auth
    LoginByEmail:
      $ref: './spec/components/schemas/auth/LoginByEmail.yaml'
    LoginByUsername:
      $ref: './spec/components/schemas/auth/LoginByUsername.yaml'
    Registration:
      $ref: './spec/components/schemas/auth/Registration.yaml'
    RegistrationAdmin:
      $ref: './spec/components/schemas/auth/RegistrationAdmin.yaml'
    UpdateUsername:
      $ref: './spec/components/schemas/auth/UpdateUsername.yaml'

    AccessToken:
      $ref: './spec/components/schemas/auth/AccessToken.yaml'
    Account:
      $ref: './spec/components/schemas/auth/Account.yaml'

    #profile
    UpdateProfile:
      $ref: './spec/components/schemas/profile/UpdateProfile.yaml'

    Profile:
      $ref: './spec/components/schemas/profile/Profile.yaml'
    ProfileData:
      $ref: './spec/components/schemas/profile/ProfileData.yaml'
    ProfilesCollection:
      $ref: './spec/components/schemas/profile/ProfilesCollection.yaml'